<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Empleado</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700,800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="top">
        <a class="volver" href="roles.html">← Volver</a>
        <button class="mode" id="modeBtn">Modo oscuro</button>
    </div>

    <div class="card">
        <div class="center">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
                </svg>
            </div>
            <div class="tag">EMPLEADO</div>
            <h1>Iniciar sesión</h1>
            <div class="sub">Ingresa tus credenciales</div>
        </div>

        <form id="form">
            <label>Usuario</label>
            <input id="usuario" required placeholder="Usuario">

            <label>Contraseña</label>
            <input id="password" type="password" required placeholder="••••••••">

            <button class="login">Iniciar sesión</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>
</div>

<script>
    // ===== VARIABLES GLOBALES =====
    const modeBtn = document.getElementById("modeBtn");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    // ===== FUNCIÓN PARA CARGAR EL MODO GUARDADO =====
    function loadSavedMode() {
        const darkMode = localStorage.getItem("darkMode") === "true";
        if (darkMode) {
            document.body.classList.add("dark");
            modeBtn.textContent = "Modo claro";
        } else {
            document.body.classList.remove("dark");
            modeBtn.textContent = "Modo oscuro";
        }
    }

    // ===== FUNCIÓN PARA CAMBIAR MODO =====
    function toggleDarkMode() {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        modeBtn.textContent = isDark ? "Modo claro" : "Modo oscuro";
        localStorage.setItem("darkMode", isDark);
    }

    // ===== FUNCIÓN PARA VALIDAR CREDENCIALES =====
    function validateCredentials(usuario, password) {
        if (!usuario || !password) {
            return {
                isValid: false,
                message: "Completa los campos"
            };
        }
        return { isValid: true };
    }

    // ===== FUNCIÓN PARA MOSTRAR MENSAJE =====
    function showMessage(text, type) {
        msg.textContent = text;
        msg.className = `msg ${type}`;
    }

    // ===== FUNCIÓN PARA MANEJAR EL LOGIN =====
    async function handleLogin(e) {
        e.preventDefault();

        const usuario = document.getElementById("usuario").value.trim();
        const password = document.getElementById("password").value;

        const validation = validateCredentials(usuario, password);
        if (!validation.isValid) {
            showMessage(validation.message, "err");
            return;
        }

        showMessage("Verificando...", "");

        try {
            const response = await fetch("/login_empleado", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ usuario, password })
            });

            const data = await response.json();

            if (data.success) {
                showMessage("Acceso concedido", "ok");
                setTimeout(() => {
                    window.location.href = "index_empleado.html";
                }, 500);
            } else {
                showMessage("Credenciales inválidas", "err");
            }
        } catch (error) {
            showMessage("Error de conexión con el servidor", "err");
            console.error("Error:", error);
        }
    }

    // ===== CARGAR MODO GUARDADO AL INICIAR =====
    loadSavedMode();

    // ===== EVENT LISTENERS =====
    modeBtn.addEventListener("click", toggleDarkMode);
    form.addEventListener("submit", handleLogin);
</script>

<style>
    :root {
        --bg: #eef2f7;
        --card: #ffffff;
        --text: #000000;
        --muted: #555555;
        --icon: #000000;
        --icon-bg: #d9d9d9;
        --input: #e2e2e2;
        --btn: #4c6ef5;
    }

    .dark {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #ffffff;
        --muted: #cbd5e1;
        --icon: #ffffff;
        --icon-bg: #334155;
        --input: #334155;
        --btn: #6366f1;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: .3s;
    }

    .container {
        width: 420px;
    }

    .top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
    }

    .volver {
        text-decoration: none;
        font-weight: 600;
        color: var(--muted);
    }

    .mode {
        border: none;
        padding: 6px 14px;
        border-radius: 20px;
        cursor: pointer;
        background: #111;
        color: #fff;
        font-family: 'Poppins', sans-serif;
    }

    .dark .mode {
        background: #fff;
        color: #111;
    }

    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,.1);
    }

    .center {
        text-align: center;
    }

    .icon {
        width: 55px;
        height: 55px;
        margin: 0 auto 10px;
        background: var(--icon-bg);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .icon svg {
        width: 28px;
        height: 28px;
        stroke: var(--icon);
        fill: none;
        stroke-width: 2;
    }

    .tag {
        display: inline-block;
        background: var(--btn);
        color: #fff;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 10px;
    }

    h1 {
        margin: 5px 0;
        font-size: 22px;
        font-weight: 600;
    }

    .sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 15px;
    }

    label {
        font-weight: 600;
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
    }

    input {
        width: 100%;
        border: none;
        border-radius: 25px;
        padding: 12px 15px;
        background: var(--input);
        font-size: 14px;
        color: var(--text);
        outline: none;
        font-family: 'Poppins', sans-serif;
    }

    .login {
        width: 100%;
        margin-top: 20px;
        border: none;
        padding: 13px;
        border-radius: 25px;
        background: var(--btn);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
    }

    .login:hover {
        opacity: .9;
    }

    .msg {
        margin-top: 10px;
        text-align: center;
        font-size: 0.9rem;
    }

    .ok { color: #28a745; }
    .err { color: #dc3545; }
</style>

</body>
</html>
