<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Administrador</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700,800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <div class="top">
        <a class="volver" href="roles.html">← Volver</a>
        <button class="mode" id="modeBtn">Modo oscuro</button>
    </div>

    <div class="card">
        <div class="center">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3l7 3v5c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-3z"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
            </div>
            <div class="tag">ADMINISTRADOR</div>
            <h1>Iniciar sesión</h1>
            <div class="sub">Ingresa tus credenciales</div>
        </div>

        <form id="form">
            <label>Usuario</label>
            <input id="usuario" required placeholder="Usuario">

            <label>Contraseña</label>
            <input id="password" type="password" required placeholder="••••••••">

            <button class="login">Iniciar sesión</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>
</div>

<script>
    // ===== VARIABLES GLOBALES =====
    const modeBtn = document.getElementById("modeBtn");
    const form = document.getElementById("form");
    const msg = document.getElementById("msg");

    // ===== FUNCIÓN PARA CARGAR EL MODO GUARDADO =====
    function loadSavedMode() {
        const darkMode = localStorage.getItem("darkMode") === "true";
        if (darkMode) {
            document.body.classList.add("dark");
            modeBtn.textContent = "Modo claro";
        } else {
            document.body.classList.remove("dark");
            modeBtn.textContent = "Modo oscuro";
        }
    }

    // ===== FUNCIÓN PARA CAMBIAR MODO =====
    function toggleDarkMode() {
        document.body.classList.toggle("dark");
        const isDark = document.body.classList.contains("dark");
        modeBtn.textContent = isDark ? "Modo claro" : "Modo oscuro";
        localStorage.setItem("darkMode", isDark);
    }

    // ===== FUNCIÓN PARA VALIDAR CREDENCIALES =====
    function validateCredentials(usuario, password) {
        if (!usuario || !password) {
            return {
                isValid: false,
                message: "Completa los campos"
            };
        }
        return { isValid: true };
    }

    // ===== FUNCIÓN PARA MOSTRAR MENSAJE =====
    function showMessage(text, type) {
        msg.textContent = text;
        msg.className = `msg ${type}`;
    }

    // ===== FUNCIÓN PARA MANEJAR EL LOGIN =====
    async function handleLogin(e) {
        e.preventDefault();

        const usuario = document.getElementById("usuario").value.trim();
        const password = document.getElementById("password").value;

        const validation = validateCredentials(usuario, password);
        if (!validation.isValid) {
            showMessage(validation.message, "err");
            return;
        }

        showMessage("Verificando credenciales...", "");

        try {
            const response = await fetch("/login_admin", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ usuario, password })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            if (data.success) {
                // Guardar información de la sesión
                localStorage.setItem("sesion_activa", "true");
                localStorage.setItem("usuario", data.usuario);
                localStorage.setItem("nombre_completo", data.nombre_completo);
                localStorage.setItem("rol", data.rol);
                localStorage.setItem("login_time", new Date().toISOString());
                
                showMessage("✅ Acceso concedido. Redirigiendo...", "ok");
                
                setTimeout(() => {
                    window.location.href = "index_admin.html";
                }, 500);
            } else {
                showMessage(data.message || "Credenciales inválidas", "err");
            }
        } catch (error) {
            console.error("Error en login:", error);
            showMessage("❌ Error de conexión con el servidor. ¿El servidor está corriendo?", "err");
        }
    }

    // ===== CARGAR MODO GUARDADO AL INICIAR =====
    loadSavedMode();

    // ===== VERIFICAR SI YA HAY SESIÓN ACTIVA =====
    function checkExistingSession() {
        const sessionActive = localStorage.getItem("sesion_activa");
        const rol = localStorage.getItem("rol");
        
        if (sessionActive === "true" && rol === "Administrador") {
            const confirmar = confirm("Ya tienes una sesión activa. ¿Quieres continuar en el panel?");
            if (confirmar) {
                window.location.href = "index_admin.html";
            } else {
                localStorage.removeItem("sesion_activa");
                localStorage.removeItem("usuario");
                localStorage.removeItem("nombre_completo");
                localStorage.removeItem("rol");
                localStorage.removeItem("login_time");
            }
        }
    }

    // ===== EVENT LISTENERS =====
    modeBtn.addEventListener("click", toggleDarkMode);
    form.addEventListener("submit", handleLogin);
    
    // Verificar sesión existente
    checkExistingSession();
</script>

<style>
    :root {
        --bg: #eef2f7;
        --card: #ffffff;
        --text: #000000;
        --muted: #555555;
        --icon: #000000;
        --icon-bg: #d9d9d9;
        --input: #e2e2e2;
        --btn: #4c6ef5;
    }

    .dark {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #ffffff;
        --muted: #cbd5e1;
        --icon: #ffffff;
        --icon-bg: #334155;
        --input: #334155;
        --btn: #6366f1;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: .3s;
    }

    .container {
        width: 420px;
    }

    .top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
    }

    .volver {
        text-decoration: none;
        font-weight: 600;
        color: var(--muted);
        transition: color 0.3s;
    }

    .volver:hover {
        color: var(--btn);
    }

    .mode {
        border: none;
        padding: 6px 14px;
        border-radius: 20px;
        cursor: pointer;
        background: #111;
        color: #fff;
        font-family: 'Poppins', sans-serif;
        transition: all 0.3s;
    }

    .mode:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .dark .mode {
        background: #fff;
        color: #111;
    }

    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,.1);
        transition: background 0.3s;
    }

    .center {
        text-align: center;
    }

    .icon {
        width: 55px;
        height: 55px;
        margin: 0 auto 10px;
        background: var(--icon-bg);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.3s;
    }

    .icon svg {
        width: 28px;
        height: 28px;
        stroke: var(--icon);
        fill: none;
        stroke-width: 2;
        transition: stroke 0.3s;
    }

    .tag {
        display: inline-block;
        background: var(--btn);
        color: #fff;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 10px;
    }

    h1 {
        margin: 5px 0;
        font-size: 22px;
        font-weight: 600;
    }

    .sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 15px;
        transition: color 0.3s;
    }

    label {
        font-weight: 600;
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
    }

    input {
        width: 100%;
        border: none;
        border-radius: 25px;
        padding: 12px 15px;
        background: var(--input);
        font-size: 14px;
        color: var(--text);
        outline: none;
        font-family: 'Poppins', sans-serif;
        transition: all 0.3s;
    }

    input:focus {
        transform: scale(1.02);
        box-shadow: 0 0 0 2px var(--btn);
    }

    .login {
        width: 100%;
        margin-top: 20px;
        border: none;
        padding: 13px;
        border-radius: 25px;
        background: var(--btn);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        transition: all 0.3s;
    }

    .login:hover {
        opacity: .9;
        transform: translateY(-2px);
    }

    .login:active {
        transform: translateY(0);
    }

    .msg {
        margin-top: 10px;
        text-align: center;
        font-size: 0.9rem;
        animation: fadeIn 0.3s;
    }

    .ok { 
        color: #28a745; 
        font-weight: 600;
    }
    
    .err { 
        color: #dc3545; 
        font-weight: 600;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

</body>
</html>
