<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Alertas de Inventario - Supermercado M&H</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #eef2f7; --card: #ffffff; --text: #1a2c3e; --muted: #5a6e7c;
            --primary: #2c7da0; --primary-dark: #1f5e7a; --success: #2e7d32;
            --danger: #c62828; --warning: #f9a825; --info: #0288d1;
            --border: #dce4ec; --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --table-header: #f8fafc; --input-readonly-bg: #e9ecef;
        }
        .dark {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
            --primary: #3b82f6; --primary-dark: #2563eb; --border: #334155;
            --table-header: #0f172a; --input-readonly-bg: #334155;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); padding: 24px; transition: all 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header-bar { background: var(--card); border-radius: 24px; padding: 20px 28px; margin-bottom: 28px; box-shadow: var(--shadow); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo h1 { font-size: 1.6rem; background: linear-gradient(135deg, var(--primary), #48cae4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { font-size: 0.8rem; color: var(--muted); }
        .header-actions { display: flex; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Poppins', sans-serif; background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); color: #1a2c3e; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        /* Panel de filtros */
        .filters-panel { background: var(--card); border-radius: 24px; padding: 20px 28px; margin-bottom: 28px; box-shadow: var(--shadow); }
        .filters-title { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: space-between; }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 0.75rem; font-weight: 600; color: var(--muted); }
        .filter-group select, .filter-group input { padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; }
        
        /* Notificaciones */
        .notifications-container { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
        .notification-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: var(--shadow); display: flex; align-items: flex-start; gap: 16px; transition: all 0.2s; border-left: 5px solid transparent; position: relative; }
        .notification-card:hover { transform: translateX(5px); }
        .notification-card.alert-stock { border-left-color: var(--warning); }
        .notification-card.alert-expiry { border-left-color: var(--danger); }
        .notification-card.alert-expiry-soon { border-left-color: var(--warning); }
        .notification-card.alert-low-stock { border-left-color: var(--warning); }
        .notification-card.alert-no-stock { border-left-color: var(--danger); }
        .notification-card.read { opacity: 0.6; background: var(--bg); }
        
        .notification-icon { font-size: 2rem; min-width: 50px; text-align: center; }
        .notification-content { flex: 1; }
        .notification-title { font-weight: 700; font-size: 1rem; margin-bottom: 5px; }
        .notification-details { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
        .notification-message { font-size: 0.9rem; margin-bottom: 10px; }
        .notification-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .notification-date { font-size: 0.7rem; color: var(--muted); margin-top: 8px; }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; margin-right: 8px; }
        .badge-stock { background: var(--warning); color: #1a2c3e; }
        .badge-expiry { background: var(--danger); color: white; }
        .badge-expiry-soon { background: var(--warning); color: #1a2c3e; }
        .badge-low { background: var(--warning); color: #1a2c3e; }
        .badge-no { background: var(--danger); color: white; }
        
        .empty-state { text-align: center; padding: 60px 20px; background: var(--card); border-radius: 24px; }
        .empty-state i { font-size: 4rem; color: var(--muted); margin-bottom: 16px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); border-radius: 32px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; padding: 28px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 12px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        .flex-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 6px; border-radius: 8px; transition: 0.2s; color: var(--muted); }
        .icon-btn:hover { background: var(--bg); color: var(--primary); }
        
        @media (max-width: 768px) {
            body { padding: 16px; }
            .notification-card { flex-direction: column; }
            .notification-icon { text-align: left; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
        
        .filter-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 10px; }
        .stats-bar { background: var(--card); border-radius: 16px; padding: 12px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .stats-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
        .mark-all-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.8rem; }
        .mark-all-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-bar">
        <div class="logo">
            <h1><i class="fas fa-bell"></i> Alertas de Inventario</h1>
            <p>Notificaciones de stock bajo y productos por vencer</p>
        </div>
        <div class="header-actions">
            <button class="btn" id="modoOscuroBtn"><i class="fas fa-moon"></i> Modo</button>
            <button class="btn btn-outline" id="volverInventario"><i class="fas fa-boxes"></i> Volver a Inventario</button>
        </div>
    </div>

    <!-- Panel de filtros -->
    <div class="filters-panel">
        <div class="filters-title">
            <h3><i class="fas fa-filter"></i> Filtrar alertas</h3>
            <button class="btn-outline btn-sm" id="limpiarFiltrosBtn"><i class="fas fa-eraser"></i> Limpiar filtros</button>
        </div>
        <div class="filters-grid">
            <div class="filter-group">
                <label><i class="fas fa-tag"></i> Tipo de alerta</label>
                <select id="filtroTipo">
                    <option value="">Todos</option>
                    <option value="stock">Stock bajo / sin stock</option>
                    <option value="expiry">Próximos a vencer</option>
                    <option value="vencido">Vencidos</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-box"></i> Categoría</label>
                <select id="filtroCategoria">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="filter-group">
                <label><i class="fas fa-flag-checkered"></i> Estado</label>
                <select id="filtroEstado">
                    <option value="">Todos</option>
                    <option value="no_leido">No leídas</option>
                    <option value="leido">Leídas</option>
                </select>
            </div>
        </div>
        <div class="filter-actions">
            <button class="btn" id="aplicarFiltrosBtn"><i class="fas fa-search"></i> Aplicar filtros</button>
        </div>
    </div>

    <!-- Barra de estadísticas -->
    <div class="stats-bar">
        <div class="stats-item"><i class="fas fa-bell"></i> <span id="totalAlertas">0</span> alertas totales</div>
        <div class="stats-item"><i class="fas fa-exclamation-triangle" style="color: var(--danger);"></i> <span id="alertasCriticas">0</span> críticas</div>
        <div class="stats-item"><i class="fas fa-clock" style="color: var(--warning);"></i> <span id="alertasPendientes">0</span> no leídas</div>
        <button class="mark-all-btn" id="marcarTodasLeidas"><i class="fas fa-check-double"></i> Marcar todas como leídas</button>
    </div>

    <!-- Lista de notificaciones -->
    <div id="notificationsContainer" class="notifications-container">
        <div class="empty-state">
            <i class="fas fa-check-circle"></i>
            <h3>¡Todo en orden!</h3>
            <p>No hay alertas de inventario en este momento.</p>
        </div>
    </div>
</div>

<!-- MODAL EDITAR STOCK -->
<div id="editStockModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Editar stock del producto</h3>
            <button class="icon-btn" id="closeEditStockModalBtn">&times;</button>
        </div>
        <form id="editStockForm">
            <input type="hidden" id="editProductoId">
            <div class="input-group full-width">
                <label>Producto</label>
                <input type="text" id="editProductoNombre" readonly style="background: var(--input-readonly-bg);">
            </div>
            <div class="input-group">
                <label>Stock actual</label>
                <input type="number" id="editStockActual" min="0" required>
            </div>
            <div class="input-group">
                <label>Stock mínimo</label>
                <input type="number" id="editStockMinimo" min="0" required>
            </div>
            <div class="flex-buttons">
                <button type="button" class="btn-outline" id="cancelEditStockBtn">Cancelar</button>
                <button type="submit" class="btn btn-success">Guardar cambios</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL EDITAR FECHA DE VENCIMIENTO -->
<div id="editExpiryModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-edit"></i> Editar fecha de vencimiento</h3>
            <button class="icon-btn" id="closeEditExpiryModalBtn">&times;</button>
        </div>
        <form id="editExpiryForm">
            <input type="hidden" id="editLoteId">
            <input type="hidden" id="editProductoIdExpiry">
            <div class="input-group full-width">
                <label>Producto / Lote</label>
                <input type="text" id="editLoteInfo" readonly style="background: var(--input-readonly-bg);">
            </div>
            <div class="input-group">
                <label>Nueva fecha de vencimiento</label>
                <input type="date" id="editFechaVencimiento" required>
            </div>
            <div class="flex-buttons">
                <button type="button" class="btn-outline" id="cancelEditExpiryBtn">Cancelar</button>
                <button type="submit" class="btn btn-success">Guardar cambios</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api';
    let productos = [];
    let lotesPorProducto = {};
    let notificaciones = [];
    let notificacionesFiltradas = [];
    
    // Elementos DOM
    const notificationsContainer = document.getElementById('notificationsContainer');
    const filtroTipo = document.getElementById('filtroTipo');
    const filtroCategoria = document.getElementById('filtroCategoria');
    const filtroEstado = document.getElementById('filtroEstado');
    const aplicarFiltrosBtn = document.getElementById('aplicarFiltrosBtn');
    const limpiarFiltrosBtn = document.getElementById('limpiarFiltrosBtn');
    const marcarTodasLeidas = document.getElementById('marcarTodasLeidas');
    const totalAlertasSpan = document.getElementById('totalAlertas');
    const alertasCriticasSpan = document.getElementById('alertasCriticas');
    const alertasPendientesSpan = document.getElementById('alertasPendientes');
    
    // Modales
    const editStockModal = document.getElementById('editStockModal');
    const editExpiryModal = document.getElementById('editExpiryModal');
    const closeEditStockModalBtn = document.getElementById('closeEditStockModalBtn');
    const closeEditExpiryModalBtn = document.getElementById('closeEditExpiryModalBtn');
    const cancelEditStockBtn = document.getElementById('cancelEditStockBtn');
    const cancelEditExpiryBtn = document.getElementById('cancelEditExpiryBtn');
    const editStockForm = document.getElementById('editStockForm');
    const editExpiryForm = document.getElementById('editExpiryForm');
    
    // LocalStorage para estado de lectura
    let alertasLeidas = JSON.parse(localStorage.getItem('alertasLeidas') || '{}');

    function guardarEstadoLectura() {
        localStorage.setItem('alertasLeidas', JSON.stringify(alertasLeidas));
    }

    function generarIdAlerta(productoId, tipo, loteId = null) {
        return `${productoId}_${tipo}${loteId ? `_${loteId}` : ''}`;
    }

    function generarNotificaciones() {
        const nuevasNotificaciones = [];
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0);
        
        for (const producto of productos) {
            const lotes = lotesPorProducto[producto.id] || [];
            
            // 1. Alertas de stock
            if (producto.stock <= 0) {
                nuevasNotificaciones.push({
                    id: generarIdAlerta(producto.id, 'no_stock'),
                    productoId: producto.id,
                    tipo: 'no_stock',
                    titulo: '⚠️ Producto sin stock',
                    mensaje: `${producto.nombre} (${producto.formato_venta || 'Unidad'} x${producto.cantidad_formato || 1}) - No hay unidades disponibles.`,
                    detalles: `Stock actual: 0 | Stock mínimo: ${producto.stock_minimo}`,
                    gravedad: 'critica',
                    fecha: new Date().toISOString(),
                    producto: producto,
                    loteId: null
                });
            } else if (producto.stock <= producto.stock_minimo) {
                nuevasNotificaciones.push({
                    id: generarIdAlerta(producto.id, 'low_stock'),
                    productoId: producto.id,
                    tipo: 'low_stock',
                    titulo: '📦 Stock bajo',
                    mensaje: `${producto.nombre} (${producto.formato_venta || 'Unidad'} x${producto.cantidad_formato || 1}) - El stock está por debajo del mínimo.`,
                    detalles: `Stock actual: ${producto.stock} | Stock mínimo: ${producto.stock_minimo}`,
                    gravedad: 'advertencia',
                    fecha: new Date().toISOString(),
                    producto: producto,
                    loteId: null
                });
            }
            
            // 2. Alertas de vencimiento por lote
            for (const lote of lotes) {
                if (lote.fecha_vencimiento) {
                    const fechaVenc = new Date(lote.fecha_vencimiento);
                    const diasRestantes = Math.ceil((fechaVenc - hoy) / (1000 * 60 * 60 * 24));
                    
                    if (diasRestantes < 0) {
                        nuevasNotificaciones.push({
                            id: generarIdAlerta(producto.id, 'expired', lote.id),
                            productoId: producto.id,
                            tipo: 'expired',
                            titulo: '❌ Producto vencido',
                            mensaje: `${producto.nombre} - Lote ${lote.numero_lote} ha vencido.`,
                            detalles: `Fecha de vencimiento: ${new Date(lote.fecha_vencimiento).toLocaleDateString()} | Cantidad: ${lote.cantidad} unidades`,
                            gravedad: 'critica',
                            fecha: new Date().toISOString(),
                            producto: producto,
                            loteId: lote.id,
                            lote: lote
                        });
                    } else if (diasRestantes <= 7) {
                        nuevasNotificaciones.push({
                            id: generarIdAlerta(producto.id, 'expiring_soon', lote.id),
                            productoId: producto.id,
                            tipo: 'expiring_soon',
                            titulo: '⏰ Producto próximo a vencer',
                            mensaje: `${producto.nombre} - Lote ${lote.numero_lote} vence en ${diasRestantes} días.`,
                            detalles: `Fecha de vencimiento: ${new Date(lote.fecha_vencimiento).toLocaleDateString()} | Cantidad: ${lote.cantidad} unidades`,
                            gravedad: 'advertencia',
                            fecha: new Date().toISOString(),
                            producto: producto,
                            loteId: lote.id,
                            lote: lote
                        });
                    }
                }
            }
        }
        
        // Restaurar estado de lectura
        for (const notif of nuevasNotificaciones) {
            if (alertasLeidas[notif.id]) {
                notif.leida = true;
            } else {
                notif.leida = false;
            }
        }
        
        notificaciones = nuevasNotificaciones;
        return notificaciones;
    }

    function actualizarEstadisticas() {
        const total = notificaciones.length;
        const criticas = notificaciones.filter(n => n.gravedad === 'critica').length;
        const pendientes = notificaciones.filter(n => !n.leida).length;
        totalAlertasSpan.textContent = total;
        alertasCriticasSpan.textContent = criticas;
        alertasPendientesSpan.textContent = pendientes;
    }

    function getIconForType(tipo, gravedad) {
        if (tipo === 'no_stock' || tipo === 'low_stock') return '<i class="fas fa-boxes" style="color: var(--warning);"></i>';
        if (tipo === 'expired') return '<i class="fas fa-skull-crosswalk" style="color: var(--danger);"></i>';
        if (tipo === 'expiring_soon') return '<i class="fas fa-clock" style="color: var(--warning);"></i>';
        return '<i class="fas fa-bell"></i>';
    }

    function getBadgeForType(tipo) {
        if (tipo === 'no_stock') return '<span class="badge badge-no">Sin stock</span>';
        if (tipo === 'low_stock') return '<span class="badge badge-low">Stock bajo</span>';
        if (tipo === 'expired') return '<span class="badge badge-expiry">Vencido</span>';
        if (tipo === 'expiring_soon') return '<span class="badge badge-expiry-soon">Próximo a vencer</span>';
        return '';
    }

    function renderNotificaciones() {
        if (notificacionesFiltradas.length === 0) {
            notificationsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-check-circle"></i>
                    <h3>¡Todo en orden!</h3>
                    <p>No hay alertas de inventario que coincidan con los filtros.</p>
                </div>`;
            return;
        }
        
        notificationsContainer.innerHTML = notificacionesFiltradas.map(notif => {
            const cardClass = `notification-card ${!notif.leida ? '' : 'read'} alert-${notif.tipo}`;
            const fecha = new Date(notif.fecha);
            const fechaStr = fecha.toLocaleDateString() + ' ' + fecha.toLocaleTimeString();
            
            let accionesHtml = '';
            if (notif.tipo === 'no_stock' || notif.tipo === 'low_stock') {
                accionesHtml = `
                    <div class="notification-actions">
                        <button class="btn-warning btn-sm" onclick="abrirEditarStock(${notif.productoId}, '${escapeHtml(notif.producto.nombre)}', ${notif.producto.stock}, ${notif.producto.stock_minimo})"><i class="fas fa-edit"></i> Editar stock</button>
                        <button class="btn-outline btn-sm" onclick="marcarComoLeida('${notif.id}')"><i class="fas fa-check"></i> Marcar como leída</button>
                        <button class="btn-danger btn-sm" onclick="eliminarAlerta('${notif.id}')"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>`;
            } else {
                accionesHtml = `
                    <div class="notification-actions">
                        <button class="btn-warning btn-sm" onclick="abrirEditarFechaVencimiento(${notif.productoId}, ${notif.loteId}, '${escapeHtml(notif.producto.nombre)}', '${escapeHtml(notif.lote?.numero_lote || '')}', '${notif.lote?.fecha_vencimiento || ''}')"><i class="fas fa-calendar-alt"></i> Editar fecha</button>
                        <button class="btn-outline btn-sm" onclick="marcarComoLeida('${notif.id}')"><i class="fas fa-check"></i> Marcar como leída</button>
                        <button class="btn-danger btn-sm" onclick="eliminarAlerta('${notif.id}')"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>`;
            }
            
            return `
                <div class="${cardClass}" data-id="${notif.id}">
                    <div class="notification-icon">${getIconForType(notif.tipo, notif.gravedad)}</div>
                    <div class="notification-content">
                        <div class="notification-title">
                            ${getBadgeForType(notif.tipo)}
                            ${escapeHtml(notif.titulo)}
                        </div>
                        <div class="notification-message">${escapeHtml(notif.mensaje)}</div>
                        <div class="notification-details">📊 ${escapeHtml(notif.detalles)}</div>
                        ${accionesHtml}
                        <div class="notification-date"><i class="far fa-clock"></i> ${fechaStr}</div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function aplicarFiltros() {
        const tipo = filtroTipo.value;
        const categoria = filtroCategoria.value;
        const estado = filtroEstado.value;
        
        notificacionesFiltradas = notificaciones.filter(notif => {
            if (tipo) {
                if (tipo === 'stock' && !['no_stock', 'low_stock'].includes(notif.tipo)) return false;
                if (tipo === 'expiry' && notif.tipo !== 'expiring_soon') return false;
                if (tipo === 'vencido' && notif.tipo !== 'expired') return false;
            }
            if (categoria && notif.producto.categoria !== categoria) return false;
            if (estado) {
                if (estado === 'no_leido' && notif.leida) return false;
                if (estado === 'leido' && !notif.leida) return false;
            }
            return true;
        });
        
        renderNotificaciones();
        actualizarEstadisticas();
    }

    function limpiarFiltros() {
        filtroTipo.value = '';
        filtroCategoria.value = '';
        filtroEstado.value = '';
        aplicarFiltros();
    }

    window.marcarComoLeida = (id) => {
        const notif = notificaciones.find(n => n.id === id);
        if (notif) {
            notif.leida = true;
            alertasLeidas[notif.id] = true;
            guardarEstadoLectura();
            aplicarFiltros();
        }
    };

    function marcarTodasComoLeidas() {
        for (const notif of notificaciones) {
            notif.leida = true;
            alertasLeidas[notif.id] = true;
        }
        guardarEstadoLectura();
        aplicarFiltros();
    }

    window.eliminarAlerta = (id) => {
        if (confirm('¿Eliminar esta alerta permanentemente?')) {
            notificaciones = notificaciones.filter(n => n.id !== id);
            delete alertasLeidas[id];
            guardarEstadoLectura();
            aplicarFiltros();
        }
    };

    window.abrirEditarStock = (productoId, nombre, stockActual, stockMinimo) => {
        document.getElementById('editProductoId').value = productoId;
        document.getElementById('editProductoNombre').value = nombre;
        document.getElementById('editStockActual').value = stockActual;
        document.getElementById('editStockMinimo').value = stockMinimo;
        editStockModal.style.display = 'flex';
    };

    window.abrirEditarFechaVencimiento = (productoId, loteId, productoNombre, loteNumero, fechaActual) => {
        document.getElementById('editLoteId').value = loteId;
        document.getElementById('editProductoIdExpiry').value = productoId;
        document.getElementById('editLoteInfo').value = `${productoNombre} - Lote ${loteNumero}`;
        if (fechaActual) {
            const fecha = new Date(fechaActual);
            const fechaFormateada = fecha.toISOString().split('T')[0];
            document.getElementById('editFechaVencimiento').value = fechaFormateada;
        } else {
            document.getElementById('editFechaVencimiento').value = '';
        }
        editExpiryModal.style.display = 'flex';
    };

    editStockForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const productoId = document.getElementById('editProductoId').value;
        const nuevoStock = parseInt(document.getElementById('editStockActual').value);
        const nuevoStockMinimo = parseInt(document.getElementById('editStockMinimo').value);
        
        const producto = productos.find(p => p.id == productoId);
        if (!producto) return;
        
        const payload = {
            ...producto,
            stock: nuevoStock,
            stock_minimo: nuevoStockMinimo
        };
        delete payload.id;
        delete payload.created_at;
        delete payload.updated_at;
        
        const res = await fetch(`${API_URL}/products/${productoId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.ok) {
            alert('✅ Stock actualizado correctamente');
            editStockModal.style.display = 'none';
            await cargarDatos();
        } else {
            alert('❌ Error al actualizar el stock');
        }
    });

    editExpiryForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const loteId = document.getElementById('editLoteId').value;
        const productoId = document.getElementById('editProductoIdExpiry').value;
        const nuevaFecha = document.getElementById('editFechaVencimiento').value || null;
        
        const lote = lotesPorProducto[productoId]?.find(l => l.id == loteId);
        if (!lote) return;
        
        const loteData = {
            producto_id: parseInt(productoId),
            cantidad: lote.cantidad,
            fecha_vencimiento: nuevaFecha,
            precio_compra: lote.precio_compra,
            numero_lote: lote.numero_lote
        };
        
        const res = await fetch(`${API_URL}/batches/${loteId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(loteData)
        });
        const data = await res.json();
        if (data.ok) {
            alert('✅ Fecha de vencimiento actualizada correctamente');
            editExpiryModal.style.display = 'none';
            await cargarDatos();
        } else {
            alert('❌ Error al actualizar la fecha de vencimiento');
        }
    });

    function actualizarSelectoresFiltros() {
        const categorias = [...new Set(productos.map(p => p.categoria).filter(c => c))];
        const catSelect = document.getElementById('filtroCategoria');
        catSelect.innerHTML = '<option value="">Todas</option>' + categorias.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    async function cargarLotesProducto(productoId) {
        try {
            const res = await fetch(`${API_URL}/batches/product/${productoId}`);
            const data = await res.json();
            if (data.ok) {
                lotesPorProducto[productoId] = (data.data || []).sort((a, b) => {
                    if (!a.fecha_vencimiento) return 1;
                    if (!b.fecha_vencimiento) return -1;
                    return new Date(a.fecha_vencimiento) - new Date(b.fecha_vencimiento);
                });
                return lotesPorProducto[productoId];
            }
            return [];
        } catch (e) { return []; }
    }

    async function cargarDatos() {
        try {
            const res = await fetch(`${API_URL}/products`);
            const data = await res.json();
            if (data.ok) {
                productos = data.data;
                for (let p of productos) { await cargarLotesProducto(p.id); }
                generarNotificaciones();
                actualizarSelectoresFiltros();
                aplicarFiltros();
                actualizarEstadisticas();
            }
        } catch (error) {
            console.error('Error cargando datos:', error);
        }
    }

    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    function cerrarModal(modalElement) { modalElement.style.display = 'none'; }
    closeEditStockModalBtn.addEventListener('click', () => cerrarModal(editStockModal));
    closeEditExpiryModalBtn.addEventListener('click', () => cerrarModal(editExpiryModal));
    cancelEditStockBtn.addEventListener('click', () => cerrarModal(editStockModal));
    cancelEditExpiryBtn.addEventListener('click', () => cerrarModal(editExpiryModal));
    window.addEventListener('click', (e) => { if (e.target === editStockModal) cerrarModal(editStockModal); if (e.target === editExpiryModal) cerrarModal(editExpiryModal); });

    aplicarFiltrosBtn.addEventListener('click', aplicarFiltros);
    limpiarFiltrosBtn.addEventListener('click', limpiarFiltros);
    marcarTodasLeidas.addEventListener('click', marcarTodasComoLeidas);

    const volverInventario = document.getElementById('volverInventario');
    volverInventario.addEventListener('click', () => { window.location.href = 'index.html'; });

    const modoBtn = document.getElementById('modoOscuroBtn');
    function toggleModo() { document.body.classList.toggle('dark'); localStorage.setItem('modoSupermercado', document.body.classList.contains('dark')); modoBtn.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> Claro' : '<i class="fas fa-moon"></i> Oscuro'; }
    if (localStorage.getItem('modoSupermercado') === 'true') { document.body.classList.add('dark'); modoBtn.innerHTML = '<i class="fas fa-sun"></i> Claro'; }
    modoBtn.addEventListener('click', toggleModo);

    cargarDatos();
</script>
</body>
</html>
